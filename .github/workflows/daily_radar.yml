name: 🎯 Daily Job Radar

on:
  # Каждый день в 07:00 UTC = 18:00 Sydney / 15:00 Singapore / 08:00 London
  schedule:
    - cron: '0 7 * * *'

  # Также можно запустить вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Получить код
        uses: actions/checkout@v4

      - name: 🐍 Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📁 Создать папку data
        run: mkdir -p data logs

      - name: 🔍 Парсинг вакансий
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          REMOTEROCKETSHIP_API_KEY: ${{ secrets.REMOTEROCKETSHIP_API_KEY }}
          REMOTEROCKETSHIP_EMAIL: ${{ secrets.REMOTEROCKETSHIP_EMAIL }}
        run: python3 scraper.py

      - name: 📬 Отправка дайджеста в Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 send_telegram.py

      - name: 💾 Сохранить live-jobs.js как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: live-jobs-${{ github.run_number }}
          path: data/live-jobs.js
          retention-days: 7
