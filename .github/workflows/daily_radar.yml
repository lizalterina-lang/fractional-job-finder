name: 🎯 Daily Job Radar

on:
  schedule:
    # Каждый день в 07:00 UTC = 18:00 Sydney / 15:00 Singapore / 08:00 London
    - cron: '0 7 * * *'

  # Запустить вручную из интерфейса GitHub
  workflow_dispatch:

# Права для GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Получить код
        uses: actions/checkout@v4

      - name: 🐍 Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📁 Создать папки
        run: mkdir -p data logs

      - name: 🔍 Парсинг вакансий
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          REMOTEROCKETSHIP_API_KEY: ${{ secrets.REMOTEROCKETSHIP_API_KEY }}
          REMOTEROCKETSHIP_EMAIL: ${{ secrets.REMOTEROCKETSHIP_EMAIL }}
        run: python3 scraper.py

      - name: 📬 Отправка дайджеста в Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/fractional-job-finder
        run: python3 send_telegram.py

      - name: 🌐 Опубликовать дашборд на GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-jobs.js
          git diff --cached --quiet || git commit -m "chore: update live jobs $(date +'%Y-%m-%d')"
          git push
